  <!-- Configuração Tailwind da AUVP e Estilos Customizados -->
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            auvp: {
              DEFAULT: '#023619',
              dark: '#011f0e',
              light: '#f0fdf4'
            }
          },
          fontFamily: {
            anek: ['"Anek Latin"', 'sans-serif'],
            roboto: ['Roboto', 'sans-serif']
          }
        }
      }
    }
  </script>
  <style>
    /* Scrollbar personalizada para um aspeto mais limpo */
    ::-webkit-scrollbar { width: 6px; }

    ::-webkit-scrollbar-thumb { background: #e5e7eb; border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: #d1d5db; }

</head>
<body class="bg-gray-200 min-h-screen flex items-center justify-center p-0 lg:p-6 font-roboto text-gray-800 antialiased selection:bg-auvp selection:text-white">

  <!-- Container Principal (Responsivo: Mobile -> Fullscreen/Max-w-md, Desktop -> 2 Colunas) -->
  <div class="w-full h-screen lg:h-[85vh] lg:min-h-[600px] lg:max-h-[850px] max-w-md lg:max-w-5xl bg-white lg:shadow-2xl lg:rounded-2xl overflow-hidden flex flex-row relative border-0 lg:border border-gray-100">
    
    <!-- LEFT PANEL (Sidebar: Pesquisa e Lista) -->
    <div id="leftPanel" class="flex flex-col w-full lg:w-[380px] h-full shrink-0 bg-white border-r border-gray-100 relative z-20">
      
      <!-- Cabeçalho Institucional -->
      <div class="bg-auvp p-6 text-white text-left relative z-20 shadow-md shrink-0">
        <h1 class="font-anek font-bold text-2xl tracking-wide">
          Os Meus Itinerários
        </h1>
        <p class="font-roboto font-light text-sm text-green-100 mt-1 opacity-90">
          Consulta rápida de voos e transfers
        </p>
      </div>

      <!-- Área de Pesquisa -->
      <div class="p-5 pb-0 relative z-30 bg-white shrink-0">
        <div class="relative">
          <i class="ph ph-magnifying-glass absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 text-xl"></i>
          <!-- Input Financeiro / Pesquisa -->
          <input 
            type="text" 
            id="searchInput" 
            placeholder="Pesquise pelo seu nome..." 
            class="w-full bg-gray-50 border border-gray-200 rounded-xl pl-12 pr-12 py-3.5 font-roboto font-normal text-gray-800 focus:outline-none focus:ring-2 focus:ring-auvp focus:bg-white transition-all shadow-sm placeholder-gray-400 text-base"
            autocomplete="off"
          >
          <button id="clearBtn" class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-400 hover:text-auvp transition-colors hidden">
            <i class="ph ph-x-circle text-2xl"></i>
          </button>
          
          <!-- Dropdown de Resultados -->
          <div id="dropdown" class="absolute top-full left-0 w-full mt-2 bg-white rounded-xl shadow-lg border border-gray-100 overflow-hidden hidden max-h-60 overflow-y-auto z-50">
            <!-- Resultados dinâmicos -->
          </div>
        </div>
      </div>

      <!-- Estado Inicial / Lista de Colaboradores -->
      <div class="flex-1 flex flex-col bg-white overflow-hidden mt-3">
        <div class="px-6 py-3 border-y border-gray-100 flex items-center gap-2 bg-gray-50/80 shrink-0">
          <i class="ph ph-users text-auvp text-xl"></i>
          <h2 class="font-anek font-bold text-[17px] text-gray-800 tracking-wide">
            Lista de Colaboradores
          </h2>
        </div>
        <!-- Lista Dinâmica de todos os nomes -->
        <div id="allUsersList" class="flex-1 overflow-y-auto pb-4 relative">
          <!-- Renderizado via JS -->
        </div>
      </div>
    </div>

    <!-- RIGHT PANEL (Detalhes do Itinerário) -->
    <!-- Escondido em mobile por defeito (max-lg:hidden), visível sempre no desktop -->
    <div id="rightPanel" class="max-lg:hidden flex flex-col flex-1 h-full bg-gray-50/50 relative z-10 overflow-hidden w-full">
      
      <!-- Resultados do Itinerário (Ticket) -->
      <div id="ticketContainer" class="p-5 lg:p-8 flex-1 overflow-y-auto hidden scroll-smooth w-full">
        <!-- O Ticket HTML será renderizado aqui -->
      </div>

      <!-- Estado Inicial / Vazio (Mostrado no Desktop quando nada está selecionado) -->
      <div id="emptyState" class="flex-1 flex flex-col items-center justify-center text-center opacity-60 p-6">
        <div class="w-20 h-20 bg-gray-100 rounded-full flex items-center justify-center mb-5 shadow-inner">
          <i class="ph ph-map-trifold text-5xl text-gray-400"></i>
        </div>
        <h3 class="font-anek font-bold text-xl text-gray-700 mb-2">Pronto para embarcar?</h3>
        <p class="font-roboto text-gray-500 max-w-[300px]">
          Pesquise ou selecione o seu nome na lista para visualizar os detalhes completos da sua viagem.
        </p>
      </div>

    // ==========================================
    // LÓGICA E ESTADO
    // ==========================================
    let database = [];
    let selectedUser = null;

    const leftPanel = document.getElementById('leftPanel');
    const rightPanel = document.getElementById('rightPanel');

    // Funções para gerir o layout em Mobile
    window.showMobileTicket = () => {
      leftPanel.classList.add('max-lg:hidden');
      rightPanel.classList.remove('max-lg:hidden');
    };

    window.hideMobileTicket = () => {
      leftPanel.classList.remove('max-lg:hidden');
      rightPanel.classList.add('max-lg:hidden');
    };

    const normalizeName = (name) => {
      if (!name || name === ',') return '';
      return name.normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase().trim();
    };

    const splitCsvLine = (line) => {
      const result = [];
      let current = '';
      let inQuotes = false;
      for (let i = 0; i < line.length; i++) {
        const char = line[i];
        if (char === '"') inQuotes = !inQuotes;
        else if (char === ',' && !inQuotes) {
          result.push(current.trim());
          current = '';
        } else current += char;
      }
      result.push(current.trim());
      return result;
    };

    const findColumnIndex = (headers, keywords) => {
      for (let i = 0; i < headers.length; i++) {
        const headerTitle = headers[i].toLowerCase();
        if (keywords.some(kw => headerTitle.includes(kw.toLowerCase()))) return i;
      }
      return -1;
    };

    // Inicialização da Base Integrando CSVs com os Detalhados
    const initDatabase = () => {
      const usersMap = new Map();

      const getUserObj = (rawName) => {
        if (!rawName) return null;
        const cleanName = rawName.trim();
        // Remove lixo / passageiros chamados apenas ','
        if (cleanName === '' || cleanName === ',') return null; 
        
        const key = normalizeName(cleanName);
        if (!key) return null;
        if (!usersMap.has(key)) {
          usersMap.set(key, { 
            nomeOriginal: cleanName, key: key, vooIda: {}, vooVolta: {}, onibus: {} 
          });
        }
        return usersMap.get(key);
      };

      // 1. Processa os CSVs (Base Legacy)
      const processCSVText = (csvText) => {
        const lines = csvText.split(/\r?\n/).filter(line => line.trim() !== '');
        if (lines.length < 2) return;

        const headers = splitCsvLine(lines[0]);
        const idxNome = findColumnIndex(headers, ['nome', 'name']);
        if (idxNome === -1) return;

        const maps = {
          locIda: findColumnIndex(headers, ['localizador ida', 'localizador', 'loc ida']),
          vooIda: findColumnIndex(headers, ['nº do voo ida', 'voo ida']),
          ciaIda: findColumnIndex(headers, ['companhia aerea ida', 'cia ida']),
          horarioIda: findColumnIndex(headers, ['horário do voo', 'horario voo']),
          locVolta: findColumnIndex(headers, ['localizador volta', 'loc volta']),
          vooVolta: findColumnIndex(headers, ['nº do voo volta', 'voo volta']),
          ciaVolta: findColumnIndex(headers, ['companhia aerea volta', 'cia volta']),
          onibusGyn: findColumnIndex(headers, ['horário onibus - saída de gyn', 'saída de gyn']),
          onibusAeroHotel: findColumnIndex(headers, ['horário onibus para hotel', 'para hotel']),
          onibusHotelAero: findColumnIndex(headers, ['horário onibus - saída rj', 'saída rj'])
        };

        for (let i = 1; i < lines.length; i++) {
          const row = splitCsvLine(lines[i]);
          const user = getUserObj(row[idxNome]);
          if (!user) continue;

          if (maps.locIda !== -1 && row[maps.locIda]) user.vooIda.localizador = row[maps.locIda];
          if (maps.vooIda !== -1 && row[maps.vooIda]) user.vooIda.numero = row[maps.vooIda];
          if (maps.ciaIda !== -1 && row[maps.ciaIda]) user.vooIda.cia = row[maps.ciaIda];
          if (maps.horarioIda !== -1 && row[maps.horarioIda]) user.vooIda.horario = row[maps.horarioIda];
          
          if (maps.locVolta !== -1 && row[maps.locVolta]) user.vooVolta.localizador = row[maps.locVolta];
          if (maps.vooVolta !== -1 && row[maps.vooVolta]) user.vooVolta.numero = row[maps.vooVolta];
          if (maps.ciaVolta !== -1 && row[maps.ciaVolta]) user.vooVolta.cia = row[maps.ciaVolta];
          
          if (maps.onibusGyn !== -1 && row[maps.onibusGyn]) user.onibus.gynParaAero = row[maps.onibusGyn];
          if (maps.onibusAeroHotel !== -1 && row[maps.onibusAeroHotel]) user.onibus.aeroParaHotel = row[maps.onibusAeroHotel];
          if (maps.onibusHotelAero !== -1 && row[maps.onibusHotelAero]) user.onibus.hotelParaAero = row[maps.onibusHotelAero];
        }
      };

      [DATA_DEMAIS_LOCALIDADES, DATA_BRASILIA_GERAL, DATA_AERO_HOTEL].forEach(processCSVText);

      // 2. Sobrescreve com os Dados Detalhados (As Imagens)
      DETAILED_DATA.forEach(detalhado => {
        const key = normalizeName(detalhado.nomeOriginal);
        // Sobrescreve ou cria o novo
        usersMap.set(key, {
          nomeOriginal: detalhado.nomeOriginal,
          key: key,
          onibus: detalhado.onibus,
          vooIda: detalhado.vooIda,
          vooVolta: detalhado.vooVolta
        });
      });

      database = Array.from(usersMap.values()).sort((a, b) => a.nomeOriginal.localeCompare(b.nomeOriginal));
      renderAllUsersList(); // Renderiza a lista de todos os colaboradores inicial
    };

    // ==========================================
    // RENDERIZAÇÃO DA LISTA COMPLETA
    // ==========================================
    const renderAllUsersList = () => {
      const container = document.getElementById('allUsersList');
      let currentLetter = '';
      let listHtml = '';

      database.forEach(user => {
        const initial = user.nomeOriginal.charAt(0).toUpperCase();
        if (initial !== currentLetter) {
          currentLetter = initial;
          listHtml += `
            <div class="sticky top-0 bg-white/95 backdrop-blur px-6 py-2 mt-2 font-anek font-bold text-auvp text-sm z-10 shadow-sm shadow-gray-50 uppercase">
              ${currentLetter}
            </div>
          `;
        }
        listHtml += `
          <button onclick="selectUser('${user.key}')" class="w-full text-left px-6 py-3.5 hover:bg-green-50 flex items-center justify-between border-b border-gray-50 last:border-none transition-colors group">
            <span class="font-roboto font-medium text-gray-700 group-hover:text-auvp">${user.nomeOriginal}</span>
            <i class="ph ph-caret-right text-gray-300 group-hover:text-auvp"></i>
          </button>
        `;
      });
      container.innerHTML = listHtml;
    };

    // ==========================================
    // INTERAÇÃO NA TELA (UI/DOM)
    // ==========================================
    const searchInput = document.getElementById('searchInput');
    const dropdown = document.getElementById('dropdown');
    const clearBtn = document.getElementById('clearBtn');
    const ticketContainer = document.getElementById('ticketContainer');
    const emptyState = document.getElementById('emptyState');

    const handleSearch = (e) => {
      const query = normalizeName(e.target.value);
      if (query.length === 0) {
        clearBtn.classList.add('hidden');
        dropdown.classList.add('hidden');
        if(!selectedUser) showEmptyState();
        return;
      }
      clearBtn.classList.remove('hidden');
      const filtered = database.filter(u => u.key.includes(query)).slice(0, 5);

      if (filtered.length > 0) {
        dropdown.innerHTML = filtered.map(user => `
          <button onclick="selectUser('${user.key}')" class="w-full text-left px-5 py-4 hover:bg-gray-50 flex items-center justify-between border-b border-gray-100 last:border-0 transition-colors group">
            <span class="font-roboto font-medium text-gray-800 group-hover:text-auvp">${user.nomeOriginal}</span>
            <i class="ph ph-caret-right text-gray-300 group-hover:text-auvp"></i>
          </button>
        `).join('');
        dropdown.classList.remove('hidden');
      } else {
        dropdown.innerHTML = `<div class="px-5 py-4 text-gray-500 font-roboto text-sm text-center">Nenhum passageiro encontrado.</div>`;
        dropdown.classList.remove('hidden');
      }
    };

    const showEmptyState = () => {
      ticketContainer.classList.add('hidden');
      emptyState.classList.remove('hidden');
      emptyState.classList.add('flex');
      selectedUser = null;
    };

    window.selectUser = (key) => {
      selectedUser = database.find(u => u.key === key);
      searchInput.value = selectedUser.nomeOriginal;
      dropdown.classList.add('hidden');
      clearBtn.classList.remove('hidden');
      renderTicket(selectedUser);
      window.showMobileTicket(); // Muda para o painel direito em Mobile
    };

    const clearSearch = () => {
      searchInput.value = '';
      dropdown.classList.add('hidden');
      clearBtn.classList.add('hidden');
      showEmptyState();
      searchInput.focus();
      window.hideMobileTicket(); // Volta para o painel esquerdo em Mobile
    };

    // ==========================================
    // TEMPLATE DO TICKET (Design System AUVP + Cabeçalhos Sofisticados)
    // ==========================================
    const renderTicket = (user) => {
      emptyState.classList.add('hidden');
      emptyState.classList.remove('flex');
      
      let html = `
        <!-- Botão Voltar (Apenas Mobile) -->
        <button onclick="window.hideMobileTicket()" class="lg:hidden mb-4 flex items-center gap-2 text-gray-500 hover:text-auvp font-medium transition-colors">
          <i class="ph ph-arrow-left text-xl"></i> Voltar à lista
        </button>

        <div class="mb-5 bg-auvp-light p-5 rounded-2xl border border-green-100/60 relative overflow-hidden shadow-sm">
          <div class="absolute -right-3 -top-3 text-green-200/50">
            <i class="ph ph-ticket text-8xl"></i>
          </div>
          <p class="font-roboto font-medium text-xs text-auvp uppercase tracking-widest mb-1 relative z-10">Cartão de Embarque</p>
          <h2 class="font-anek font-bold text-2xl text-auvp-dark leading-tight relative z-10">${user.nomeOriginal}</h2>
        </div>
        <div class="space-y-4">
      `;

      const createStep = (icon, title, detailsHtml, badge) => `
        <div class="bg-white rounded-2xl p-5 border border-gray-100 shadow-sm relative group overflow-hidden">
          <div class="absolute left-0 top-0 bottom-0 w-1.5 bg-auvp opacity-90 rounded-l-2xl"></div>
          <div class="flex gap-4 items-start">
            <div class="bg-green-50 w-12 h-12 rounded-xl flex items-center justify-center shrink-0 text-auvp shadow-sm">
              <i class="ph ${icon} text-2xl"></i>
            </div>
            <div class="flex-1 w-full overflow-hidden">
              <div class="flex justify-between items-center mb-3 pb-2 border-b border-gray-50">
                 <h3 class="font-anek font-bold text-[18px] text-gray-800 leading-none">${title}</h3>
                 ${badge ? `<span class="bg-gray-100 text-gray-600 text-[10px] font-bold px-2 py-1 rounded-md uppercase tracking-wide">${badge}</span>` : ''}
              </div>
              ${detailsHtml}
            </div>
          </div>
        </div>
      `;

      const renderFlightDetails = (voo) => {
        // Formato detalhado (com array de trechos/ligações)
        if (voo.trechos && voo.trechos.length > 0) {
          let detalhes = `
            <div class="flex justify-between items-center mb-3">
               <p class="font-roboto text-xs text-gray-500 uppercase">Loc: <strong class="text-auvp text-sm tracking-wide ml-1">${voo.localizador}</strong></p>
               <p class="font-roboto text-xs text-gray-500 uppercase">Data: <strong class="text-gray-800 text-sm ml-1">${voo.data || ''}</strong></p>
            </div>
            <div class="relative pl-4 border-l-2 border-dashed border-gray-200 space-y-4 ml-1">`;
          
          voo.trechos.forEach(t => {
            detalhes += `
              <div class="relative">
                <div class="absolute -left-[21px] top-[6px] bg-white border-[3px] border-auvp w-[14px] h-[14px] rounded-full"></div>
                <div class="flex justify-between items-start">
                   <div>
                       <p class="font-anek font-bold text-lg text-gray-800 leading-none flex items-center gap-1.5">
                         ${t.origem} <i class="ph ph-arrow-right text-gray-400 text-sm"></i> ${t.destino}
                       </p>
                       <p class="font-roboto text-xs text-gray-500 mt-1">${t.cia} - ${t.voo}</p>
                   </div>
                   <div class="text-right">
                       <p class="font-roboto font-semibold text-gray-800 leading-none text-sm">${t.saida} <span class="font-light text-gray-400 mx-0.5">/</span> ${t.chegada}</p>
                   </div>
                </div>
              </div>
            `;
          });
          detalhes += `</div>`;
          return detalhes;
        } 
        
        // Formato antigo (CSV Simples)
        let detalhes = `<div class="flex items-center justify-between gap-2">`;
        detalhes += `<div>
            <p class="font-roboto font-light text-[11px] text-gray-500 uppercase tracking-wide">Localizador</p>
            <p class="font-anek font-bold text-xl text-auvp uppercase tracking-wider mt-0.5">${voo.localizador || '---'}</p>
          </div>`;
        if (voo.horario) {
          detalhes += `<div class="text-right">
            <p class="font-roboto font-light text-[11px] text-gray-500 uppercase tracking-wide">Horário</p>
            <p class="font-roboto font-semibold text-gray-800 flex items-center justify-end gap-1 mt-0.5">
              <i class="ph ph-clock text-gray-400"></i> ${voo.horario}
            </p>
          </div>`;
        }
        detalhes += `</div>`;
        if (voo.cia || voo.numero) {
          detalhes += `<div class="mt-3 pt-2 border-t border-dashed border-gray-100">
            <p class="font-roboto font-light text-[11px] text-gray-500 uppercase tracking-wide">Voo / Cia Aérea</p>
            <p class="font-roboto font-medium text-gray-800 mt-0.5">${voo.cia || ''} ${voo.numero ? `(${voo.numero})` : ''}</p>
          </div>`;
        }
        return detalhes;
      };

      // 1. Ônibus GYN -> Aero
      if (user.onibus?.gynParaAero) {
        html += createStep('ph-bus', 'Transporte de Origem', `
          <div>
            <p class="font-roboto font-light text-xs text-gray-500 uppercase mb-0.5 tracking-wide">Partida p/ Aeroporto</p>
            <p class="font-roboto font-semibold text-gray-800 flex items-center gap-1.5">
              <i class="ph ph-clock text-auvp"></i> ${user.onibus.gynParaAero}
            </p>
            
            <div class="mt-3 bg-gray-50 border border-gray-100 rounded-lg p-3 flex items-start gap-2.5">
               <i class="ph ph-info text-auvp text-xl mt-0.5"></i>
               <p class="font-roboto text-[13px] text-gray-600 leading-relaxed">
                 O ônibus parte do <strong>escritório da AUVP</strong>. Por favor, chegue com a devida antecedência.
               </p>
            </div>
          </div>
        `, 'TERRESTRE');
      }

      // 2. Voo de Ida
      if (user.vooIda?.localizador || user.vooIda?.horario || user.vooIda?.trechos) {
        html += createStep('ph-airplane-takeoff', 'Voo de Partida', renderFlightDetails(user.vooIda), 'AÉREO');
      }

      // 3. Transfer Chegada
      if (user.onibus?.aeroParaHotel) {
        html += createStep('ph-map-pin', 'Transfer de Chegada', `
          <div>
            <p class="font-roboto font-light text-xs text-gray-500 uppercase mb-0.5 tracking-wide">Aeroporto ➔ Hotel (RJ)</p>
            <p class="font-roboto font-semibold text-gray-800 flex items-center gap-1.5">
              <i class="ph ph-clock text-auvp"></i> ${user.onibus.aeroParaHotel}
            </p>
          </div>
        `, 'TERRESTRE');
      }

      // 4. Transfer Retorno
      if (user.onibus?.hotelParaAero) {
        html += createStep('ph-map-pin', 'Transfer de Retorno', `
          <div>
            <p class="font-roboto font-light text-xs text-gray-500 uppercase mb-0.5 tracking-wide">Hotel (RJ) ➔ Aeroporto</p>
            <p class="font-roboto font-semibold text-gray-800 flex items-center gap-1.5">
              <i class="ph ph-clock text-auvp"></i> ${user.onibus.hotelParaAero}
            </p>
          </div>
        `, 'TERRESTRE');
      }

      // 5. Voo de Volta
      if (user.vooVolta?.localizador || user.vooVolta?.trechos) {
        html += createStep('ph-airplane-landing', 'Voo de Regresso', renderFlightDetails(user.vooVolta), 'AÉREO');
      }

      // Fallback Vazio
      if (Object.keys(user.vooIda).length === 0 && Object.keys(user.vooVolta).length === 0 && Object.keys(user.onibus).length === 0) {
        html += `
          <div class="text-center p-8 bg-white rounded-2xl border border-gray-100 shadow-sm">
            <div class="w-16 h-16 bg-gray-50 rounded-full flex items-center justify-center mx-auto mb-3">
               <i class="ph ph-warning-circle text-3xl text-gray-400"></i>
            </div>
            <p class="font-roboto text-gray-500 text-sm">Nenhum detalhe de viagem localizado para este passageiro até ao momento.</p>
          </div>
        `;
      }

      // Botão Limpar Pesquisa (Apenas Mobile, porque no Desktop basta clicar num nome na lista ao lado)
      html += `
        <button onclick="clearSearch()" class="lg:hidden w-full mt-2 bg-auvp hover:bg-auvp-dark text-white rounded-xl py-3.5 font-anek font-semibold text-lg flex items-center justify-center gap-2 transition-all shadow-md active:scale-[0.98]">
          <i class="ph ph-magnifying-glass"></i> Nova Pesquisa
        </button>
      </div>`;

      ticketContainer.innerHTML = html;
      ticketContainer.classList.remove('hidden');
    };

    // Inicializadores
    searchInput.addEventListener('input', handleSearch);
    clearBtn.addEventListener('click', clearSearch);
    document.addEventListener('click', (e) => {
      if (!searchInput.contains(e.target) && !dropdown.contains(e.target)) dropdown.classList.add('hidden');
    });

    initDatabase();
  </script>
</body>
</html>
